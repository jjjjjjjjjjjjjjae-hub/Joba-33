name: Android CI (GameHub Build)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Кодты алу (Checkout)
      uses: actions/checkout@v4

    - name: Java 17 ортасын орнату
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Gradlew файлына рұқсат беру
      run: chmod +x gradlew

    - name: APK жинақтау (Build)
      run: ./gradlew assembleDebug

    - name: Дайын APK файлын сақтау
      uses: actions/upload-artifact@v4
      with:
        name: GameHub-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
